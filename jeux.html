<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#090B10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nos Jeux">
<title>Nos Jeux 🎮</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#090B10;--surface:#111318;--card:#181C24;--border:#252B38;
  --gold:#C9A84C;--gold-soft:rgba(201,168,76,.15);--gold-border:rgba(201,168,76,.3);
  --rose:#E8637A;--rose-soft:rgba(232,99,122,.12);--rose-border:rgba(232,99,122,.3);
  --blue:#4A9EE8;--blue-soft:rgba(74,158,232,.12);--blue-border:rgba(74,158,232,.3);
  --purple:#8B6FD4;--purple-soft:rgba(139,111,212,.12);
  --green:#3A9E6A;--green-soft:rgba(58,158,106,.12);
  --text:#F0EDE8;--muted:#8B90A0;--dim:#3A4055;
  --radius:16px;--nav-h:74px;
  --font-d:'Playfair Display',serif;--font-b:'Inter',sans-serif;
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);overflow:hidden}
button{font-family:var(--font-b);cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:var(--font-b)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

/* HEADER */
.app-header{background:rgba(9,11,16,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 18px 12px;flex-shrink:0;z-index:50}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header-back{display:flex;align-items:center;gap:8px;color:var(--gold);font-size:14px;font-weight:700;text-decoration:none}
.header-title{font-family:var(--font-d);font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-bar{display:flex;gap:8px;align-items:center}
.score-pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}

/* LAYOUT */
.app-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:16px 16px calc(var(--nav-h)+16px);opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .25s,transform .25s}
.page.active{opacity:1;pointer-events:all;transform:translateY(0)}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;height:var(--nav-h);background:rgba(17,19,24,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 4px 8px;z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:12px;transition:all .2s;flex:1;position:relative}
.nav-btn.active{background:var(--gold-soft)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:8px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.3px}
.nav-btn.active .nav-label{color:var(--gold)}
.nav-turn{position:absolute;top:2px;right:8px;width:8px;height:8px;background:var(--rose);border-radius:50%;border:1.5px solid var(--bg);display:none}
.nav-turn.show{display:block}

/* COMPONENTS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.section-title{font-family:var(--font-d);font-size:20px;font-weight:800;margin-bottom:14px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px 20px;border-radius:14px;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--gold),#E8A84C);color:#0D0F14;transition:all .2s;border:none;cursor:pointer;width:100%;font-family:var(--font-b)}
.btn:active{transform:scale(.97)}
.btn-rose{background:linear-gradient(135deg,var(--rose),#F07A8A);color:white}
.btn-blue{background:linear-gradient(135deg,var(--blue),#6AB4F0);color:white}
.btn-purple{background:linear-gradient(135deg,var(--purple),#A88FE4);color:white}
.btn-green{background:linear-gradient(135deg,var(--green),#5ABA8A);color:white}
.btn-outline{background:transparent;border:1.5px solid var(--gold);color:var(--gold)}
.btn-outline-rose{background:transparent;border:1.5px solid var(--rose);color:var(--rose)}
.btn-sm{padding:9px 16px;font-size:12px;border-radius:10px;width:auto}
.btn-lg{padding:18px 20px;font-size:16px;border-radius:16px}
.input{width:100%;padding:12px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--gold)}
.input::placeholder{color:var(--dim)}
.toast{position:fixed;bottom:calc(var(--nav-h)+14px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);border:1px solid var(--gold-border);color:var(--text);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty-state{text-align:center;color:var(--dim);padding:40px 0}
.empty-icon{font-size:48px;margin-bottom:10px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease forwards}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.pop{animation:pop .3s ease}
.conf-wrap{position:fixed;inset:0;z-index:3000;pointer-events:none;overflow:hidden}
.conf{position:absolute;width:8px;height:8px;animation:confFall var(--d) ease-in var(--dl) forwards;top:-10px;left:var(--x);background:var(--c);border-radius:var(--br);transform:rotate(var(--r))}
@keyframes confFall{to{transform:translateY(110vh) rotate(calc(var(--r)+720deg));opacity:0}}

/* ACCUEIL JEUX */
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.game-card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:16px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.game-card:active{transform:scale(.96)}
.game-card.turn{border-color:var(--rose);box-shadow:0 0 16px rgba(232,99,122,.2)}
.game-card.turn::before{content:'À TON TOUR';position:absolute;top:8px;right:8px;background:var(--rose);color:white;font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;letter-spacing:.5px}
.game-icon{font-size:36px;margin-bottom:8px;display:block}
.game-name{font-family:var(--font-d);font-size:15px;font-weight:800;margin-bottom:4px}
.game-desc{font-size:10px;color:var(--muted);line-height:1.4}
.game-scores{display:flex;gap:6px;margin-top:8px}
.game-score-pill{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}

/* SCOREBOARD */
.scoreboard{background:linear-gradient(135deg,var(--gold-soft),var(--rose-soft));border:1px solid var(--gold-border);border-radius:20px;padding:16px;margin-bottom:16px}
.score-vs{display:flex;align-items:center;justify-content:space-around}
.score-player{text-align:center}
.score-name{font-size:11px;font-weight:700;margin-bottom:4px}
.score-num{font-family:var(--font-d);font-size:36px;font-weight:900}
.score-vs-sep{font-size:18px;color:var(--dim)}
.score-bar-wrap{height:6px;background:var(--surface);border-radius:3px;margin-top:12px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--rose),var(--gold));transition:width .6s}

/* QUIZ */
.quiz-header{text-align:center;margin-bottom:16px}
.quiz-cat-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px}
.quiz-cat-tabs::-webkit-scrollbar{display:none}
.quiz-cat-btn{flex:0 0 auto;padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--border);color:var(--muted);white-space:nowrap;transition:all .2s;background:transparent}
.quiz-cat-btn.active{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
.quiz-question-card{background:linear-gradient(135deg,var(--gold-soft),var(--purple-soft));border:1px solid var(--gold-border);border-radius:20px;padding:20px;text-align:center;margin-bottom:16px}
.quiz-q-num{font-size:10px;color:var(--muted);margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.quiz-q-text{font-family:var(--font-d);font-size:18px;font-weight:800;line-height:1.4;margin-bottom:6px}
.quiz-q-about{font-size:11px;color:var(--gold);font-weight:700}
.quiz-answer-btn{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 16px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;text-align:left;transition:all .2s;width:100%;margin-bottom:8px;font-family:var(--font-b);display:flex;align-items:center;gap:10px}
.quiz-answer-btn:active{transform:scale(.98)}
.quiz-answer-btn.correct{border-color:var(--green);background:var(--green-soft);color:var(--green)}
.quiz-answer-btn.wrong{border-color:var(--rose);background:var(--rose-soft);color:var(--rose)}
.quiz-answer-btn.reveal{border-color:var(--gold);background:var(--gold-soft)}
.quiz-letter{width:28px;height:28px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.quiz-result-card{text-align:center;padding:30px 0}
.quiz-result-score{font-family:var(--font-d);font-size:52px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.quiz-progress{height:6px;background:var(--surface);border-radius:3px;margin-bottom:16px;overflow:hidden}
.quiz-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--rose));border-radius:3px;transition:width .4s}

/* DEVINE MA PENSÉE */
.devine-word-display{font-family:var(--font-d);font-size:48px;font-weight:900;text-align:center;letter-spacing:8px;margin:20px 0;color:var(--gold)}
.devine-clue{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.devine-clue-num{width:28px;height:28px;border-radius:50%;background:var(--gold-soft);border:1px solid var(--gold-border);color:var(--gold);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.devine-clue-text{font-size:13px;color:var(--text)}
.devine-guess-row{display:flex;gap:8px}
.devine-lives{display:flex;gap:6px;justify-content:center;margin:12px 0}
.devine-life{font-size:20px;transition:all .3s}
.devine-life.lost{opacity:.2;transform:scale(.8)}
.devine-category-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:14px;cursor:pointer;transition:all .2s;text-align:center;margin-bottom:8px}
.devine-category-card:active{border-color:var(--gold);background:var(--gold-soft)}

/* VRAI OU FAUX */
.vf-statement{background:linear-gradient(135deg,var(--purple-soft),var(--rose-soft));border:1px solid rgba(139,111,212,.3);border-radius:20px;padding:22px;text-align:center;margin-bottom:20px}
.vf-statement-text{font-family:var(--font-d);font-size:18px;font-weight:800;line-height:1.5}
.vf-about{font-size:11px;color:var(--purple);font-weight:700;margin-top:8px}
.vf-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.vf-btn{padding:20px;border-radius:18px;font-size:22px;font-family:var(--font-d);font-weight:900;cursor:pointer;transition:all .2s;border:2px solid var(--border);background:var(--card)}
.vf-btn:active{transform:scale(.95)}
.vf-btn.vrai{border-color:var(--green);background:var(--green-soft);color:var(--green)}
.vf-btn.faux{border-color:var(--rose);background:var(--rose-soft);color:var(--rose)}
.vf-reveal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.vf-reveal-answer{font-size:13px;font-weight:700;margin-bottom:4px}
.vf-reveal-expl{font-size:12px;color:var(--muted);line-height:1.5}

/* NIVEAU DE COMPLICITÉ */
.complic-q{background:linear-gradient(135deg,var(--rose-soft),var(--gold-soft));border:1px solid var(--rose-border);border-radius:20px;padding:20px;text-align:center;margin-bottom:16px}
.complic-q-text{font-family:var(--font-d);font-size:17px;font-weight:800;line-height:1.5;margin-bottom:14px}
.complic-answers{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.complic-answer-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center}
.complic-answer-who{font-size:9px;font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.complic-answer-val{font-size:15px;font-weight:700}
.complic-match{text-align:center;padding:16px;background:var(--green-soft);border:1px solid rgba(58,158,106,.3);border-radius:14px;margin-bottom:10px}
.complic-nomatch{text-align:center;padding:16px;background:var(--rose-soft);border:1px solid var(--rose-border);border-radius:14px;margin-bottom:10px}
.complic-level{font-family:var(--font-d);font-size:28px;font-weight:900;text-align:center;margin:12px 0;background:linear-gradient(135deg,var(--gold),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* BAC À DEUX */
.bac-letter{font-family:var(--font-d);font-size:80px;font-weight:900;text-align:center;background:linear-gradient(135deg,var(--gold),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:10px 0;line-height:1}
.bac-timer{font-family:var(--font-d);font-size:36px;font-weight:900;text-align:center;color:var(--gold);margin:8px 0}
.bac-timer.urgent{color:var(--rose);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.bac-category{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.bac-cat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.bac-cat-input{background:transparent;border:none;color:var(--text);font-size:16px;font-weight:700;width:100%;outline:none;padding:0}
.bac-cat-input::placeholder{color:var(--dim);font-weight:400}
.bac-reveal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.bac-reveal-col{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.bac-reveal-who{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.bac-reveal-item{font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.bac-reveal-item:last-child{border:none}
.bac-point-btn{font-size:16px;cursor:pointer;padding:2px}

/* 20 QUESTIONS */
.vingt-item{font-family:var(--font-d);font-size:24px;font-weight:900;text-align:center;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;padding:20px 0;margin-bottom:8px}
.vingt-q-num{text-align:center;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.vingt-question-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px}
.vingt-q-text{font-size:14px;font-weight:600;margin-bottom:10px}
.vingt-q-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.vingt-q-btn{padding:9px 4px;border-radius:10px;font-size:11px;font-weight:700;border:1.5px solid var(--border);color:var(--muted);text-align:center;cursor:pointer;transition:all .2s;background:transparent}
.vingt-q-btn:active{transform:scale(.95)}
.vingt-q-btn.oui{border-color:var(--green);background:var(--green-soft);color:var(--green)}
.vingt-q-btn.non{border-color:var(--rose);background:var(--rose-soft);color:var(--rose)}
.vingt-q-btn.peut{border-color:var(--gold);background:var(--gold-soft);color:var(--gold)}
.vingt-answered{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-radius:10px;padding:8px 12px;margin-bottom:5px}
.vingt-answered-q{font-size:12px;color:var(--text);flex:1}
.vingt-answered-r{font-size:18px;flex-shrink:0}
.vingt-guess-area{background:linear-gradient(135deg,var(--blue-soft),var(--purple-soft));border:1px solid var(--blue-border);border-radius:16px;padding:16px;margin-bottom:12px}
</style>
</head>
<body>
<div class="app-wrap">
  <div class="app-header">
    <div class="header-row">
      <button onclick="window.location.href='index.html'" class="header-back" style="text-decoration:none;background:none;border:none;cursor:pointer">← App</button>
      <div class="header-title">Nos Jeux 🎮</div>
      <div style="font-size:10px;color:var(--muted);font-weight:600" id="jeux-profile-label"></div>
      <div class="score-bar">
        <div class="score-pill" style="background:var(--rose-soft);color:var(--rose)" id="hdr-raphy">💗 0</div>
        <div class="score-pill" style="background:var(--blue-soft);color:var(--blue)" id="hdr-mehdi">💙 0</div>
      </div>
    </div>
  </div>

  <div class="pages">

    <!-- ACCUEIL JEUX -->
    <div class="page active" id="page-home">
      <div class="scoreboard" id="scoreboard"></div>
      <div class="games-grid" id="games-grid"></div>
    </div>

    <!-- QUIZ -->
    <div class="page" id="page-quiz">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <button onclick="goTo('home')" style="color:var(--muted);font-size:20px">←</button>
        <div class="section-title" style="margin-bottom:0">🧠 Quiz sur l'autre</div>
      </div>
      <div class="quiz-cat-tabs" id="quiz-cat-tabs"></div>
      <div class="quiz-progress"><div class="quiz-progress-fill" id="quiz-prog-fill" style="width:0%"></div></div>
      <div id="quiz-zone"></div>
    </div>

    <!-- DEVINE MA PENSÉE -->
    <div class="page" id="page-devine">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <button onclick="goTo('home')" style="color:var(--muted);font-size:20px">←</button>
        <div class="section-title" style="margin-bottom:0">💭 Devine ma pensée</div>
      </div>
      <div id="devine-zone"></div>
    </div>

    <!-- VRAI OU FAUX -->
    <div class="page" id="page-vf">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <button onclick="goTo('home')" style="color:var(--muted);font-size:20px">←</button>
        <div class="section-title" style="margin-bottom:0">✅ Vrai ou Faux</div>
      </div>
      <div id="vf-zone"></div>
    </div>

    <!-- NIVEAU DE COMPLICITÉ -->
    <div class="page" id="page-complic">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <button onclick="goTo('home')" style="color:var(--muted);font-size:20px">←</button>
        <div class="section-title" style="margin-bottom:0">💑 Niveau de complicité</div>
      </div>
      <div id="complic-zone"></div>
    </div>

    <!-- BAC À DEUX -->
    <div class="page" id="page-bac">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <button onclick="goTo('home')" style="color:var(--muted);font-size:20px">←</button>
        <div class="section-title" style="margin-bottom:0">🔤 Bac à deux</div>
      </div>
      <div id="bac-zone"></div>
    </div>

function celebrate(){
  const w=document.getElementById("conf-wrap");w.style.display="block";w.innerHTML="";
  const colors=["#C9A84C","#E8637A","#4A9EE8","#8B6FD4","#3A9E6A"];
  for(let i=0;i<50;i++){const p=document.createElement("div");p.className="conf";const c=colors[Math.floor(Math.random()*colors.length)];p.style.cssText=`--x:${Math.random()*100}%;--d:${1+Math.random()*2}s;--dl:${Math.random()*.5}s;--c:${c};--r:${Math.random()*360}deg;--br:${Math.random()>=0.5?"50%":"2px"}`;w.appendChild(p);}
  setTimeout(()=>{w.style.display="none";w.innerHTML=""},3500);
}
function dbSave(path, val){if(!window._db)return;window._set(window._ref(window._db,`nous/jeux/${path}`),val).catch(()=>{})}
function dbGet(path, cb){if(!window._db)return;window._get(window._ref(window._db,`nous/jeux/${path}`)).then(snap=>{cb(snap.val())}).catch(()=>cb(null))}
function dbListen(path, cb){if(!window._db)return;window._onValue(window._ref(window._db,`nous/jeux/${path}`),snap=>cb(snap.val()))}
function addPoints(who, pts){
  S.scores[who]=(S.scores[who]||0)+pts;
  dbSave("scores", S.scores);
  lsSet("jeux_scores", S.scores);
  updateScoreboard();
  toast(`+${pts} pts ${who==="raphy"?"💗":"💙"} !`);
}
function shuffle(arr){return arr.slice().sort(()=>Math.random()-.5)}
function p2(n){return String(n).padStart(2,"0")}

// ═══════════════════════════ NAVIGATION ═══════════════════════════
function goTo(page, btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  const pg=document.getElementById(`page-${page}`);if(pg)pg.classList.add("active");
  if(btn)btn.classList.add("active");
  else document.querySelectorAll(".nav-btn").forEach(b=>{if(b.getAttribute("onclick")?.includes(`'${page}'`))b.classList.add("active")});
  S.currentPage=page;
  switch(page){
    case"home":renderHome();break;
    case"quiz":renderQuiz();break;
    case"devine":renderDevine();break;
    case"vf":renderVF();break;
    case"p4":renderP4();break;
    case"morpion":renderMorpion();break;
    case"thisorthat":renderTOT();break;
    case"prefere":renderPref();break;
    case"pendu":renderPendu();break;
    case"naval":renderNaval();break;
    case"dessine":renderDessine();break;
    case"uno":renderUno();break;
    case"complic":renderComplic();break;
    case"bac":renderBac();break;
    case"vingt":renderVingt();break;
  }
}

// ═══════════════════════════ INIT ═══════════════════════════
function initApp(){
  // Récupérer le profil depuis l'app principale
  S.profile = sessionStorage.getItem("nous_profile") || lsGet("profile") || "raphy";
  S.scores = lsGet("jeux_scores") || {raphy:0,mehdi:0};
  // Sync scores depuis Firebase
  dbListen("scores", val=>{if(val){S.scores=val;lsSet("jeux_scores",val);updateScoreboard();updateHeaderScores();}});
  // Sync états des jeux
  dbListen("divine_state", val=>{if(val)S.devineFB=val;checkTurns();});
  dbListen("vf_state", val=>{if(val)S.vfFB=val;checkTurns();});
  dbListen("complic_state", val=>{if(val)S.complicFB=val;if(S.currentPage==="complic")renderComplic();checkTurns();});
  dbListen("bac_state", val=>{if(val)S.bacFB=val;if(S.currentPage==="bac")renderBac();checkTurns();});
  dbListen("vingt_state", val=>{if(val)S.vingtFB=val;if(S.currentPage==="vingt")renderVingt();checkTurns();});
  dbListen("p4_state", val=>{if(val)S.p4FB=val;if(S.currentPage==="p4")renderP4();if(S.currentPage==="home")renderHome();});
  dbListen("morpion_state", val=>{if(val)S.morpionFB=val;if(S.currentPage==="morpion")renderMorpion();if(S.currentPage==="home")renderHome();});
  dbListen("tot_state", val=>{if(val)S.totFB=val;if(S.currentPage==="thisorthat")renderTOT();});
  dbListen("pref_state", val=>{if(val)S.prefFB=val;if(S.currentPage==="prefere")renderPref();});
  dbListen("pendu_state", val=>{if(val)S.penduFB=val;if(S.currentPage==="pendu")renderPendu();if(S.currentPage==="home")renderHome();});
  dbListen("naval_state", val=>{if(val)S.navalFB=val;if(S.currentPage==="naval")renderNaval();if(S.currentPage==="home")renderHome();});
  dbListen("dessine_state", val=>{if(val)S.dessineFB=val;if(S.currentPage==="dessine")renderDessine();if(S.currentPage==="home")renderHome();});
  dbListen("uno_state", val=>{if(val)S.unoFB=val;if(S.currentPage==="uno")renderUno();if(S.currentPage==="home")renderHome();});
  renderHome();
  updateHeaderScores();
  const profileEl = document.getElementById("jeux-profile-label");
  if(profileEl) profileEl.textContent = S.profile==="raphy"?"💗 Raphy":"💙 Mehdi";
}

function updateHeaderScores(){
  document.getElementById("hdr-raphy").textContent=`💗 ${S.scores.raphy||0}`;
  document.getElementById("hdr-mehdi").textContent=`💙 ${S.scores.mehdi||0}`;
}

function checkTurns(){
  // Quiz - toujours jouable
  const other = S.profile==="raphy"?"mehdi":"raphy";
  // Check complic
  const cf=S.complicFB;
  if(cf&&cf.answers&&cf.answers[other]&&!cf.answers[S.profile]){
    document.getElementById("turn-complic").classList.add("show");
  } else {
    document.getElementById("turn-complic").classList.remove("show");
  }
  // Check vingt
  const vf=S.vingtFB;
  if(vf&&vf.guesser===S.profile&&vf.phase==="asking"){
    document.getElementById("turn-vingt").classList.add("show");
  } else {
    document.getElementById("turn-vingt").classList.remove("show");
  }
  // Check bac
  const bf=S.bacFB;
  if(bf&&bf.phase==="reveal"&&bf.answers&&bf.answers[other]&&!bf.points){
    document.getElementById("turn-bac").classList.add("show");
  } else {
    document.getElementById("turn-bac").classList.remove("show");
  }
}

// ═══════════════════════════ ACCUEIL ═══════════════════════════
function renderHome(){
  updateScoreboard();
  const other = S.profile==="raphy"?"mehdi":"raphy";
  const GAMES = [
    {id:"quiz",icon:"🧠",name:"Quiz sur l'autre",desc:"40+ questions sur vos goûts, habitudes & rêves",color:"var(--gold)",turn:false},
    {id:"devine",icon:"💭",name:"Devine ma pensée",desc:"Fais deviner un mot secret avec des indices",color:"var(--purple)",turn:false},
    {id:"vf",icon:"✅",name:"Vrai ou Faux",desc:"20 affirmations vraies ou fausses sur vous deux",color:"var(--green)",turn:false},
    {id:"complic",icon:"💑",name:"Niveau de complicité",desc:"Même question, comparez vos réponses",color:"var(--rose)",turn:!!(S.complicFB?.answers?.[other]&&!S.complicFB?.answers?.[S.profile])},
    {id:"bac",icon:"🔤",name:"Bac à deux",desc:"Même lettre, mêmes catégories — qui est le plus rapide ?",color:"var(--blue)",turn:false},
    {id:"vingt",icon:"🎯",name:"20 Questions",desc:"Devine à quoi pense l'autre en 20 questions",color:"#FF7A45",turn:S.vingtFB?.guesser===S.profile&&S.vingtFB?.phase==="asking"},
    {id:"p4",icon:"🔴",name:"Puissance 4",desc:"Aligne 4 jetons avant l'autre — en temps réel !",color:"#E8637A",turn:S.p4FB&&S.p4FB.turn===S.profile&&!S.p4FB.winner},
    {id:"morpion",icon:"⭕",name:"Morpion",desc:"Le classique 3-en-ligne, à deux",color:"var(--blue)",turn:S.morpionFB&&S.morpionFB.turn===S.profile&&!S.morpionFB.winner},
    {id:"thisorthat",icon:"⚡",name:"Ça ou ça",desc:"Choix rapides — découvrez votre compatibilité",color:"#FF7A45",turn:false},
    {id:"prefere",icon:"🤔",name:"Tu préfères ?",desc:"Des dilemmes, vous répondez chacun votre tour",color:"var(--purple)",turn:false},
    {id:"pendu",icon:"🪢",name:"Le Pendu",desc:"L'un cache un mot, l'autre devine les lettres",color:"var(--gold)",turn:!!(S.penduFB&&S.penduFB.setter&&S.penduFB.setter!==S.profile&&!S.penduFB.over)},
    {id:"naval",icon:"🚢",name:"Bataille navale",desc:"Placez vos bateaux, tirez chacun votre tour",color:"var(--blue)",turn:!!(S.navalFB&&S.navalFB.phase==="playing"&&S.navalFB.turn===S.profile)},
    {id:"dessine",icon:"🎨",name:"Devine & dessine",desc:"L'un dessine, l'autre devine quand il veut",color:"var(--rose)",turn:!!(S.dessineFB&&S.dessineFB.drawer&&S.dessineFB.drawer!==S.profile&&!S.dessineFB.found)},
    {id:"uno",icon:"🃏",name:"Uno",desc:"Le célèbre jeu de cartes, à deux",color:"var(--green)",turn:!!(S.unoFB&&S.unoFB.turn===S.profile&&!S.unoFB.winner)},
  ];
  const scores = S.scores;
  document.getElementById("games-grid").innerHTML = GAMES.map(g=>`
    <div class="game-card${g.turn?" turn":""}" onclick="goTo('${g.id}')">
      <span class="game-icon">${g.icon}</span>
      <div class="game-name" style="color:${g.color}">${g.name}</div>
      <div class="game-desc">${g.desc}</div>
      <div class="game-scores">
        <span class="game-score-pill" style="background:var(--rose-soft);color:var(--rose)">💗 ${scores.raphy||0}</span>
        <span class="game-score-pill" style="background:var(--blue-soft);color:var(--blue)">💙 ${scores.mehdi||0}</span>
      </div>
    </div>`).join("");
}

function updateScoreboard(){
  updateHeaderScores();
  const s=S.scores;const total=(s.raphy||0)+(s.mehdi||0);
  const rPct=total?Math.round((s.raphy||0)/total*100):50;
  const winner=s.raphy>s.mehdi?"💗 Raphy mène !":s.mehdi>s.raphy?"💙 Mehdi mène !":"Égalité parfaite ! 🤝";
  document.getElementById("scoreboard").innerHTML=`
    <div class="score-vs">
      <div class="score-player"><div class="score-name" style="color:var(--rose)">💗 Raphy</div><div class="score-num" style="color:var(--rose)">${s.raphy||0}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">points</div></div>
      <div style="text-align:center"><div class="score-vs-sep">VS</div><div style="font-size:11px;color:var(--gold);font-weight:700;margin-top:6px">${winner}</div></div>
      <div class="score-player"><div class="score-name" style="color:var(--blue)">💙 Mehdi</div><div class="score-num" style="color:var(--blue)">${s.mehdi||0}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">points</div></div>
    </div>
    <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${rPct}%"></div></div>`;
}
</script>
<script>
// ═══════════════════════════ QUIZ ═══════════════════════════
function renderQuiz(){
  const cats=[
    {id:"gouts",label:"🍽️ Goûts"},{id:"quotidien",label:"🌅 Quotidien"},
    {id:"souvenirs",label:"📸 Souvenirs"},{id:"reves",label:"🌟 Rêves"}
  ];
  // Tabs
  document.getElementById("quiz-cat-tabs").innerHTML = cats.map(c=>
    `<button class="quiz-cat-btn${S.quiz.cat===c.id?" active":""}" onclick="setQuizCat('${c.id}')">${c.label}</button>`
  ).join("");
  renderQuizQuestion();
}

function setQuizCat(cat){
  S.quiz.cat=cat; S.quiz.idx=0; S.quiz.score=0; S.quiz.answered=[];
  document.querySelectorAll(".quiz-cat-btn").forEach(b=>b.classList.toggle("active",b.textContent.includes(cat==="gouts"?"Goûts":cat==="quotidien"?"Quotidien":cat==="souvenirs"?"Souvenirs":"Rêves")));
  renderQuizQuestion();
}

function renderQuizQuestion(){
  const qs = QUIZ_QUESTIONS[S.quiz.cat];
  const el = document.getElementById("quiz-zone");
  const prog = document.getElementById("quiz-prog-fill");
  prog.style.width = `${(S.quiz.idx/qs.length)*100}%`;

  if(S.quiz.idx >= qs.length){
    const score = S.quiz.score;
    const total = qs.length;
    const pct = Math.round(score/total*100);
    const pts = score*3;
    let msg = pct>=90?"Parfait ! Tu me connais par cœur 🥰":pct>=70?"Très bien ! On se connaît bien 💑":pct>=50?"Pas mal, encore des trucs à découvrir 😄":"Il faut qu'on passe plus de temps ensemble ! 😂";
    el.innerHTML=`<div class="quiz-result-card fade-in">
      <div style="font-size:64px;margin-bottom:12px">${pct>=80?"🏆":pct>=60?"🥈":"🎮"}</div>
      <div class="quiz-result-score">${score}/${total}</div>
      <div style="color:var(--muted);font-size:13px;margin-top:6px">${msg}</div>
      <div style="color:var(--gold);font-size:14px;font-weight:700;margin-top:12px">+${pts} points pour ${S.profile==="raphy"?"Raphy 💗":"Mehdi 💙"}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px">
        <button class="btn btn-outline" onclick="restartQuiz()">Rejouer 🔄</button>
        <button class="btn" onclick="claimQuizPoints(${pts})">Récupérer mes points !</button>
      </div>
    </div>`;
    return;
  }

  const q = qs[S.quiz.idx];
  const shuffledOpts = q.opts.map((o,i)=>({o,i})).sort(()=>Math.random()-.5);
  const correctShuffled = shuffledOpts.findIndex(s=>s.i===q.correct);
  const who = q.who==="tous"?"les deux":(q.who==="raphy"?"💗 Raphy":"💙 Mehdi");
  const whoColor = q.who==="raphy"?"var(--rose)":q.who==="mehdi"?"var(--blue)":"var(--gold)";

  el.innerHTML=`<div class="quiz-question-card fade-in">
    <div class="quiz-q-num">Question ${S.quiz.idx+1} / ${qs.length}</div>
    <div class="quiz-q-text">${q.q}</div>
    <div class="quiz-q-about" style="color:${whoColor}">À propos de ${who}</div>
  </div>
  ${shuffledOpts.map((item,si)=>`
    <button class="quiz-answer-btn" id="qa-${si}" onclick="answerQuiz(${si},${correctShuffled})">
      <div class="quiz-letter">${String.fromCharCode(65+si)}</div>
      ${item.o}
    </button>`).join("")}`;
}

function answerQuiz(chosen, correct){
  const btns = document.querySelectorAll(".quiz-answer-btn");
  btns.forEach((b,i)=>{
    if(i===correct)b.classList.add("correct");
    else if(i===chosen&&i!==correct)b.classList.add("wrong");
    b.disabled=true;
  });
  if(chosen===correct){S.quiz.score++;celebrate();}
  // Ajouter explication
  const q = QUIZ_QUESTIONS[S.quiz.cat][S.quiz.idx];
  const expl = q.expl;
  const expEl = document.createElement("div");
  expEl.className="card fade-in";
  expEl.style.cssText="margin-top:8px;border-color:"+(chosen===correct?"var(--green)":"var(--rose)");
  expEl.innerHTML=`<div style="font-size:12px;line-height:1.5">${chosen===correct?"✅ Bien joué ! ":"❌ Raté — "}<span style="color:var(--muted)">${expl}</span></div>`;
  document.getElementById("quiz-zone").appendChild(expEl);
  S.quiz.idx++;
  setTimeout(renderQuizQuestion, 1600);
}

function restartQuiz(){S.quiz.idx=0;S.quiz.score=0;S.quiz.answered=[];renderQuizQuestion();}
function claimQuizPoints(pts){addPoints(S.profile, pts);dbSave(`quiz_last/${S.profile}`,{score:S.quiz.score,total:QUIZ_QUESTIONS[S.quiz.cat].length,cat:S.quiz.cat,ts:Date.now()});toast("Points ajoutés ! 🏆");restartQuiz();}

// ═══════════════════════════ VRAI OU FAUX ═══════════════════════════
function renderVF(){
  const el = document.getElementById("vf-zone");
  const qs = S.vfAnswered || [];
  const remaining = VF_STATEMENTS.filter((_,i)=>!qs.includes(i));
  if(!remaining.length || S.vf.idx>=VF_STATEMENTS.length){
    const score = S.vf.score||0;
    const total = VF_STATEMENTS.length;
    const pts = score*2;
    el.innerHTML=`<div class="quiz-result-card fade-in">
      <div style="font-size:56px;margin-bottom:12px">${score>=15?"🏆":score>=10?"🥈":"🎯"}</div>
      <div class="quiz-result-score">${score}/${total}</div>
      <div style="color:var(--muted);font-size:13px;margin:8px 0">${score>=15?"Tu nous connais parfaitement !":score>=10?"Tu nous connais bien 💑":"Il y a encore des mystères ! 😄"}</div>
      <div style="color:var(--gold);font-size:14px;font-weight:700;margin-bottom:16px">+${pts} points</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button class="btn btn-outline" onclick="resetVF()">Rejouer 🔄</button>
        <button class="btn" onclick="claimVFPoints(${pts})">Réclamer !</button>
      </div>
    </div>`;
    return;
  }

  const idx = S.vf.idx || 0;
  const stmt = VF_STATEMENTS[idx];
  const who = stmt.who==="tous"?"les deux":(stmt.who==="raphy"?"💗 Raphy":"💙 Mehdi");
  const whoColor = stmt.who==="raphy"?"var(--rose)":stmt.who==="mehdi"?"var(--blue)":"var(--gold)";

  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:11px;color:var(--muted);font-weight:600">${idx+1} / ${VF_STATEMENTS.length}</div>
      <div style="font-size:11px;color:var(--gold);font-weight:700">Score : ${S.vf.score||0}</div>
    </div>
    <div class="quiz-progress" style="margin-bottom:16px"><div class="quiz-progress-fill" style="width:${(idx/VF_STATEMENTS.length)*100}%"></div></div>
    <div class="vf-statement fade-in">
      <div class="vf-statement-text">"${stmt.text}"</div>
      <div class="vf-about" style="color:${whoColor}">À propos de ${who}</div>
    </div>
    <div class="vf-btns">
      <button class="vf-btn vrai" onclick="answerVF(true)">✅ VRAI</button>
      <button class="vf-btn faux" onclick="answerVF(false)">❌ FAUX</button>
    </div>`;
}

function answerVF(answer){
  const idx = S.vf.idx || 0;
  const stmt = VF_STATEMENTS[idx];
  const correct = answer === stmt.answer;
  if(!S.vf.score)S.vf.score=0;
  if(correct){S.vf.score++;celebrate();}
  const el = document.getElementById("vf-zone");
  const result = document.createElement("div");
  result.className=`vf-reveal fade-in`;
  result.style.borderColor = correct?"var(--green)":"var(--rose)";
  result.style.background = correct?"var(--green-soft)":"var(--rose-soft)";
  result.innerHTML=`
    <div class="vf-reveal-answer" style="color:${correct?"var(--green)":"var(--rose)"}">${correct?"✅ Bonne réponse !":"❌ Mauvaise réponse"} — C'était <strong>${stmt.answer?"VRAI":"FAUX"}</strong></div>
    <div class="vf-reveal-expl">${stmt.expl}</div>`;
  const stmtEl = el.querySelector(".vf-statement");
  const btnsEl = el.querySelector(".vf-btns");
  if(btnsEl){btnsEl.querySelectorAll("button").forEach(b=>b.disabled=true);}
  if(stmtEl)stmtEl.after(result);
  S.vf.idx = idx+1;
  setTimeout(renderVF, 1800);
}
function resetVF(){S.vf.idx=0;S.vf.score=0;renderVF();}
function claimVFPoints(pts){addPoints(S.profile, pts);dbSave(`vf_last/${S.profile}`,{score:S.vf.score,ts:Date.now()});toast("Points ajoutés ! 🏆");resetVF();}

// ═══════════════════════════ NIVEAU DE COMPLICITÉ ═══════════════════════════
function renderComplic(){
  const el = document.getElementById("complic-zone");
  const state = S.complicFB || {};
  const myAns = state.answers?.[S.profile];
  const otherAns = state.answers?.[S.profile==="raphy"?"mehdi":"raphy"];
  const q = COMPLIC_QUESTIONS[state.qIdx||0];

  // Phase 1 : choisir une réponse
  if(!myAns){
    el.innerHTML=`
      <div style="text-align:center;margin-bottom:14px">
        <div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px">Question ${(state.qIdx||0)+1} / ${COMPLIC_QUESTIONS.length}</div>
        <div style="font-size:13px;color:var(--gold);margin-top:4px">${otherAns?"✅ L'autre a déjà répondu — à toi !":`En attente de ${S.profile==="raphy"?"Mehdi":"Raphy"}...`}</div>
      </div>
      <div class="complic-q fade-in">
        <div style="font-size:24px;margin-bottom:8px">${q.emoji}</div>
        <div class="complic-q-text">${q.q}</div>
        ${q.opts.map((o,i)=>`<button onclick="answerComplicIdx(${i})" style="background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;width:100%;margin-bottom:8px;text-align:left;cursor:pointer;font-family:var(--font-b);transition:all .2s" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">
          <span style="color:var(--gold);font-weight:700;margin-right:8px">${String.fromCharCode(65+i)}.</span>${o}
        </button>`).join("")}`;
    return;
  }

  // Phase 2 : attente de l'autre
  if(!otherAns){
    el.innerHTML=`<div class="empty-state fade-in">
      <div class="empty-icon">⏳</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:8px">Ta réponse est envoyée !</div>
      <div style="font-size:13px;color:var(--muted)">En attente de ${S.profile==="raphy"?"Mehdi 💙":"Raphy 💗"}...<br>On verra si vous pensez pareil 😏</div>
      <div style="margin-top:16px;background:var(--card);border:1px solid var(--gold-border);border-radius:14px;padding:14px;text-align:left">
        <div style="font-size:10px;color:var(--muted);margin-bottom:6px">Ta réponse :</div>
        <div style="font-size:14px;font-weight:700;color:var(--gold)">${myAns}</div>
      </div>
    </div>`;
    return;
  }

  // Phase 3 : révélation
  const match = myAns === otherAns;
  const history = state.history || [];
  const matchCount = history.filter(h=>h.match).length;
  const totalCount = history.length + 1;
  let level = matchCount/totalCount >= 0.8 ? "💑 Âmes sœurs" : matchCount/totalCount >= 0.6 ? "🥰 Super complices" : matchCount/totalCount >= 0.4 ? "😊 Bien accordés" : "🤔 Encore à découvrir";

  el.innerHTML=`<div class="fade-in">
    <div class="complic-q" style="margin-bottom:14px">
      <div style="font-size:24px;margin-bottom:8px">${q.emoji}</div>
      <div class="complic-q-text">${q.q}</div>
    </div>
    <div class="complic-answers" style="margin-bottom:12px">
      <div class="complic-answer-card" style="border-color:var(--rose)">
        <div class="complic-answer-who" style="color:var(--rose)">💗 Raphy</div>
        <div class="complic-answer-val">${state.answers.raphy||"—"}</div>
      </div>
      <div class="complic-answer-card" style="border-color:var(--blue)">
        <div class="complic-answer-who" style="color:var(--blue)">💙 Mehdi</div>

function answerComplicIdx(optIdx){
  const idx = S.complicFB?.qIdx||0;
  const q = COMPLIC_QUESTIONS[idx];
  if(q && q.opts[optIdx]!==undefined) answerComplic(q.opts[optIdx]);
}
function answerComplic(answer){
  const idx = S.complicFB?.qIdx||0;
  const update={};
  update[`answers/${S.profile}`]=answer;
  if(!window._db)return;
  window._update(window._ref(window._db,`nous/jeux/complic_state`),update).then(()=>{
    if(!S.complicFB)S.complicFB={};
    if(!S.complicFB.answers)S.complicFB.answers={};
    S.complicFB.answers[S.profile]=answer;
    renderComplic();
  });
}

function nextComplicQ(){
  const state = S.complicFB||{};
  const oldHistory = state.history||[];
  const myAns = state.answers?.[S.profile]||"";
  const otherAns = state.answers?.[S.profile==="raphy"?"mehdi":"raphy"]||"";
  const match = myAns===otherAns;
  const newHistory = [...oldHistory,{q:COMPLIC_QUESTIONS[state.qIdx||0].q,raphy:state.answers?.raphy,mehdi:state.answers?.mehdi,match}];
  const nextIdx = ((state.qIdx||0)+1)%COMPLIC_QUESTIONS.length;
  dbSave("complic_state",{qIdx:nextIdx,answers:{},history:newHistory,pointed:false});
}

      <button class="btn" onclick="resetVingt()">Nouvelle partie 🎯</button>
    </div>`;
    if(state.correct&&!state.pointed){addPoints(state.guesser,8);dbSave("vingt_state/pointed",true);}
    return;
  }

  if(isPicker){
    el.innerHTML=`<div class="fade-in">
      <div style="text-align:center;margin-bottom:14px">
        <div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px">Ton mot secret</div>
        <div class="vingt-item">${state.item}</div>
        <div style="font-size:12px;color:var(--muted)">Question ${currentQ+1}/20 — réponds oui ou non !</div>
      </div>
      ${currentQ<VINGT_QUESTIONS.length?`
        <div class="vingt-guess-area">
          <div style="font-size:11px;color:var(--blue);font-weight:700;margin-bottom:8px">🎯 ${state.guesser==="raphy"?"Raphy":"Mehdi"} demande :</div>
          <div style="font-family:var(--font-d);font-size:16px;font-weight:700;margin-bottom:14px">${VINGT_QUESTIONS[currentQ]}</div>
          <div class="vingt-q-btns" style="grid-template-columns:1fr 1fr 1fr">
            <button class="vingt-q-btn" onclick="answerVingt('oui')">✅ Oui</button>
            <button class="vingt-q-btn" onclick="answerVingt('non')">❌ Non</button>
            <button class="vingt-q-btn" onclick="answerVingt('peut')">🤔 Parfois</button>
          </div>
        </div>
        ${state.pendingGuess?`
          <div style="margin-top:12px;background:var(--gold-soft);border:1px solid var(--gold-border);border-radius:14px;padding:14px;text-align:center">
            <div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:6px">💡 ${state.guesser==="raphy"?"Raphy":"Mehdi"} tente :</div>
            <div style="font-family:var(--font-d);font-size:20px;font-weight:900;margin-bottom:12px">${state.pendingGuess}</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
              <button class="btn btn-green btn-sm" onclick="vingtGuessed(true)">✅ Correct !</button>
              <button class="btn btn-outline-rose btn-sm" onclick="rejectVingtGuess()">❌ Non, continue</button>
            </div>
          </div>`:""}
        <div style="margin-top:12px">
          <button class="btn btn-outline-rose btn-sm" style="width:auto" onclick="vingtGuessed(false)">😅 Impossible, révéler le mot</button>
        </div>`:"<div class='card' style='text-align:center;color:var(--muted)'>20 questions posées ! A-t-il/elle trouvé ?</div>"}
      <div style="margin-top:14px">
        <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px">Réponses précédentes :</div>
        ${answered.map((a,i)=>`<div class="vingt-answered"><span class="vingt-answered-q">${VINGT_QUESTIONS[i]}</span><span class="vingt-answered-r">${a==="oui"?"✅":a==="non"?"❌":"🤔"}</span></div>`).join("")}
      </div>
    </div>`;
  }

  if(isGuesser){
    el.innerHTML=`<div class="fade-in">
      <div style="text-align:center;margin-bottom:14px">
        <div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px">${state.picker==="raphy"?"Raphy":"Mehdi"} pense à quelque chose...</div>
        <div style="font-size:12px;color:var(--gold);margin-top:4px">Question ${currentQ+1} / 20</div>
      </div>
      <div style="margin-top:14px">
        <div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px">Tes réponses jusqu'ici :</div>
        ${answered.length===0?`<div style="color:var(--dim);font-size:12px;text-align:center;padding:16px">Aucune question posée — ${state.picker==="raphy"?"Raphy":"Mehdi"} doit répondre à la première !</div>`:""}
        ${answered.map((a,i)=>`<div class="vingt-answered"><span class="vingt-answered-q">${VINGT_QUESTIONS[i]}</span><span class="vingt-answered-r">${a==="oui"?"✅":a==="non"?"❌":"🤔"}</span></div>`).join("")}
      </div>
      <div class="vingt-guess-area" style="margin-top:14px">
        ${state.pendingGuess?`
          <div style="text-align:center">
            <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Ta tentative envoyée :</div>
            <div style="font-family:var(--font-d);font-size:18px;font-weight:800;color:var(--gold);margin-bottom:8px">${state.pendingGuess}</div>
            <div style="font-size:12px;color:var(--muted)">En attente de validation de ${state.picker==="raphy"?"Raphy 💗":"Mehdi 💙"}...</div>
            <button class="btn btn-outline btn-sm" style="margin-top:10px" onclick="cancelVingtGuess()">Modifier ma tentative</button>
          </div>`:`
          <div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:8px">Ta tentative :</div>
          <input class="input" id="vingt-final-guess" placeholder="J'ai trouvé ! C'est..." style="margin-bottom:10px">
          <button class="btn btn-rose" onclick="submitVingtGuess()">Je tente ma chance ! 🎯</button>`}
      </div>
    </div>`;
  }
}

function startVingt(){
  const item=document.getElementById("vingt-item-input").value.trim();if(!item){toast("Écris quelque chose !");return}
  const other=S.profile==="raphy"?"mehdi":"raphy";
  const state={active:true,item,picker:S.profile,guesser:other,phase:"asking",answered:[],currentQ:0,pointed:false,ts:Date.now()};
  dbSave("vingt_state",state);S.vingtFB=state;renderVingt();
  toast("C'est parti ! Attends ses questions 🎯");
}

function answerVingt(answer){
  const state=S.vingtFB||{};
  const answered=[...(state.answered||[]),answer];
  const nextQ=(state.currentQ||0)+1;
  dbSave("vingt_state/answered",answered);
  dbSave("vingt_state/currentQ",nextQ);
  S.vingtFB={...state,answered,currentQ:nextQ};
  renderVingt();
}

function submitVingtGuess(){
  const guess=document.getElementById("vingt-final-guess")?.value.trim();if(!guess)return;
  const state=S.vingtFB||{};
  dbSave("vingt_state/pendingGuess",guess);
  S.vingtFB={...state,pendingGuess:guess};
  toast(`"${guess}" envoyé ! ${state.picker==="raphy"?"Raphy":"Mehdi"} va valider 🎯`);
  renderVingt();
}

function vingtGuessed(correct){
  const state=S.vingtFB||{};
  dbSave("vingt_state/phase","guessed");
  dbSave("vingt_state/correct",correct);
  S.vingtFB={...state,phase:"guessed",correct};
  renderVingt();
}
function rejectVingtGuess(){
  // Le picker refuse la tentative — on efface et le guesser continue
  dbSave("vingt_state/pendingGuess",null);
  if(S.vingtFB)S.vingtFB.pendingGuess=null;
  toast("Tentative refusée — continuez le jeu !");
  renderVingt();
}
function cancelVingtGuess(){
  dbSave("vingt_state/pendingGuess",null);
  if(S.vingtFB)S.vingtFB.pendingGuess=null;
  renderVingt();
}

function resetVingt(){dbSave("vingt_state",{active:false});S.vingtFB={active:false};renderVingt();}
